<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeCamera Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 20px;
            background: #1a1a1a; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 1200px; margin: 0 auto; }
        .camera-tile { position: relative; background: #2a2a2a; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; border: 1px solid #333; }

        /* video fills tile */
        .camera-tile video {
            width: 100%; height: 100%; display: block; object-fit: cover; background: #000;
        }
        /* placeholder shown while loading */
        .placeholder {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #666; background: linear-gradient(45deg, #222, #333); gap: 8px; font-size: 13px;
        }
        .placeholder.hidden { display: none; }
        .placeholder .icon { font-size: 32px; }

        /* bottom bar */
        .camera-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 24px 10px 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            font-size: 12px; display: flex; justify-content: space-between; align-items: flex-end;
        }
        .last-seen { font-size: 10px; color: #aaa; }

        /* PTZ overlay */
        .controls-overlay {
            position: absolute; inset: 0;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.35); opacity: 0; transition: opacity .3s;
        }
        .camera-tile:hover .controls-overlay { opacity: 1; }
        .ptz-grid { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 10px; }
        .ptz-btn {
            background: rgba(255,255,255,.2); border: none; color: #fff;
            width: 50px; height: 50px; border-radius: 50%; font-size: 16px;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .ptz-btn:hover { background: rgba(255,255,255,.4); }

.status-badge { padding: 4px 12px; border-radius: 20px; font-size: 14px; background: #2e7d32; }
        .dot-online { color: #4caf50; }
        .dot-offline { color: #f44336; }
        .dot-ready   { color: #ff9800; }
        .dot-connecting { color: #888; }
        .live-badge {
            background: #c62828; color: #fff;
            padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold;
            margin-right: 6px; vertical-align: middle;
        }
        .rec-btn {
            position: absolute; top: 8px; left: 8px;
            background: rgba(0,0,0,.55); border: none; color: #fff;
            padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
            opacity: 0; transition: opacity .2s;
        }
        .camera-tile:hover .rec-btn { opacity: 1; }

        /* Recordings modal */
        #rec-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.85); z-index: 1000;
            align-items: center; justify-content: center;
        }
        #rec-modal.open { display: flex; }
        #rec-box {
            background: #1e1e1e; border-radius: 12px; width: 900px; max-width: 95vw;
            max-height: 90vh; display: flex; flex-direction: column; overflow: hidden;
        }
        #rec-header {
            padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #333;
        }
        #rec-header h2 { margin: 0; font-size: 16px; }
        #rec-close {
            background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; line-height: 1;
        }
        #rec-close:hover { color: #fff; }
        #rec-body { display: flex; flex: 1; overflow: hidden; min-height: 420px; }
        #rec-list {
            width: 240px; min-width: 240px; overflow-y: auto;
            border-right: 1px solid #333; padding: 8px 0;
        }
        .rec-item {
            padding: 10px 14px; cursor: pointer; border-left: 3px solid transparent;
            transition: background .15s;
        }
        .rec-item:hover { background: #2a2a2a; }
        .rec-item.playing { background: #1a3a1a; border-left-color: #4caf50; }
        .rec-item.active-rec { border-left-color: #c62828; }
        #rec-recording-banner {
            padding: 8px 14px; font-size: 11px; color: #ff6b6b;
            border-bottom: 1px solid #333; display: none;
        }
        #rec-recording-banner.visible { display: block; }
        .rec-item-date { font-size: 12px; color: #fff; }
        .rec-item-meta { font-size: 10px; color: #888; margin-top: 2px; }
        #rec-player-area { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        #rec-video { width: 100%; border-radius: 8px; background: #000; max-height: 380px; }
        #rec-nowplaying { font-size: 12px; color: #aaa; }
        #rec-empty { color: #666; font-size: 13px; padding: 40px; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>HomeCamera Dashboard</h1>
        <div id="status-badge" class="status-badge">Loading…</div>
    </div>
    <div class="grid" id="camera-grid"></div>

<!-- Recordings modal -->
<div id="rec-modal">
    <div id="rec-box">
        <div id="rec-header">
            <h2 id="rec-title">Recordings</h2>
            <button id="rec-close" onclick="closeRecordings()">✕</button>
        </div>
        <div id="rec-recording-banner">● Recording in progress — current segment will appear when complete (~5 min)</div>
        <div id="rec-body">
            <div id="rec-list"></div>
            <div id="rec-player-area">
                <video id="rec-video" controls></video>
                <div id="rec-nowplaying"></div>
            </div>
        </div>
    </div>
</div>

<script>
const grid = document.getElementById('camera-grid');
const statusBadge = document.getElementById('status-badge');
const builtTiles = {};   // id → true once DOM is built

function dotClass(s) {
    return s === 'online' ? 'dot-online' : s === 'ready' ? 'dot-ready' : s === 'offline' ? 'dot-offline' : 'dot-connecting';
}

// ── Build a Lorex tile with live HLS video ──────────────────────────────────
function buildLorexTile(cam) {
    const tile = document.createElement('div');
    tile.className = 'camera-tile';
    tile.id = 'tile-' + cam.id;

    tile.innerHTML = `
        <video id="vid-${cam.id}" autoplay muted playsinline></video>
        <div class="placeholder" id="ph-${cam.id}">
            <div class="icon">📹</div>
            <div>Connecting to stream…</div>
        </div>
        ${cam.ptz ? `
        <div class="controls-overlay">
            <div class="ptz-grid">
                <button style="grid-area:up"    class="ptz-btn" onclick="sendPTZ('${cam.id}','up')">▲</button>
                <button style="grid-area:left"  class="ptz-btn" onclick="sendPTZ('${cam.id}','left')">◀</button>
                <button style="grid-area:right" class="ptz-btn" onclick="sendPTZ('${cam.id}','right')">▶</button>
                <button style="grid-area:down"  class="ptz-btn" onclick="sendPTZ('${cam.id}','down')">▼</button>
            </div>
        </div>` : ''}
        <button class="rec-btn" onclick="openRecordings('${cam.id}','${cam.name}')">⏺ Recordings</button>
        <div class="camera-label">
            <span>
                <span class="live-badge">LIVE</span>
                <span id="dot-${cam.id}" class="${dotClass(cam.status)}">●</span> ${cam.name}
            </span>
            <span class="last-seen" id="ts-${cam.id}"></span>
        </div>`;

    return tile;
}

// Attach a self-healing HLS player to a tile. Tracks freshness via the timestamp
// of the last loaded fragment (not video.currentTime, which can drift slightly
// even when the stream is dead and which goes to zero when the player pauses on
// error). Single-flight reload prevents multiple concurrent fatal-error events
// from scheduling overlapping retries — that pattern was leaving tiles stuck on
// the "retrying…" placeholder while zombie HLS instances fought over the video
// element. On 2nd+ consecutive failure we hit /api/diag/<cam> and console.log
// the server-side state so it's obvious whether ffmpeg is dead or fine.
function attachHLS(cam) {
    const video = document.getElementById('vid-' + cam.id);
    const ph    = document.getElementById('ph-' + cam.id);
    if (!video || !cam.stream) return;

    const streamUrl = cam.stream;
    let hls = null;
    let watchTimer = null;
    let reloadPending = false;
    let lastFragTime = 0;          // Date.now() of last successful FRAG_LOADED
    let consecutiveFailures = 0;
    let hiddenSince = 0;

    const log = (msg, ...rest) => {
        console.log(`[${new Date().toLocaleTimeString()}][${cam.id}] ${msg}`, ...rest);
    };
    const showPh = (msg) => {
        ph.classList.remove('hidden');
        ph.querySelector('div:last-child').textContent = msg;
    };
    const hidePh = () => ph.classList.add('hidden');

    function destroyHls() {
        if (watchTimer) { clearInterval(watchTimer); watchTimer = null; }
        if (hls) { try { hls.destroy(); } catch (e) { log('destroy err', e); } hls = null; }
    }

    function scheduleReload(delayMs, reason) {
        if (reloadPending) { log('reload already pending, skip:', reason); return; }
        reloadPending = true;
        log(`reload in ${delayMs}ms — ${reason}`);
        showPh('Stream unavailable — retrying…');
        setTimeout(() => {
            log(`reload now — ${reason}`);
            destroyHls();
            reloadPending = false;
            tryPlay();
        }, delayMs);
    }

    async function logServerDiag() {
        try {
            const r = await fetch(`/api/diag/${cam.id}`);
            log('SERVER DIAG:', await r.json());
        } catch (e) { log('diag fetch failed', e); }
    }

    function startWatch() {
        if (watchTimer) clearInterval(watchTimer);
        lastFragTime = Date.now();
        watchTimer = setInterval(() => {
            const ageMs = Date.now() - lastFragTime;
            if (ageMs > 15000 && !reloadPending) {
                log(`STUCK: no fragment for ${ageMs}ms (failures=${consecutiveFailures})`);
                consecutiveFailures += 1;
                if (consecutiveFailures >= 2) logServerDiag();
                scheduleReload(2000, `no fragments for ${ageMs}ms`);
            }
        }, 5000);
    }

    function tryPlay() {
        if (!Hls.isSupported()) {
            // Safari native HLS path — no recovery logic, browser handles it
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl + '?t=' + Date.now();
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(() => {});
                    hidePh();
                }, { once: true });
            } else {
                showPh('HLS not supported in this browser');
            }
            return;
        }

        log('creating new HLS instance');
        hls = new Hls({
            liveSyncDurationCount: 2,
            liveMaxLatencyDurationCount: 4,
            maxBufferLength: 4,
            maxMaxBufferLength: 8,
            // Jump straight to live edge on recovery — no fast-play catch-up loop
            maxLiveSyncPlaybackRate: 1,
            liveBackBufferLength: 0,
            // Cache-bust every HLS request. ffmpeg reuses segment names after a
            // watchdog restart, so the browser's HTTP cache must never serve a
            // stale seg000.ts from a previous run.
            xhrSetup: (xhr, url) => {
                const sep = url.includes('?') ? '&' : '?';
                xhr.open('GET', url + sep + '_t=' + Date.now(), true);
            },
        });
        hls.loadSource(streamUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            log('MANIFEST_PARSED');
            video.play().catch((e) => log('play() rejected:', e));
            hidePh();
            startWatch();
        });
        hls.on(Hls.Events.FRAG_LOADED, () => {
            lastFragTime = Date.now();
            consecutiveFailures = 0;
            const ts = document.getElementById('ts-' + cam.id);
            if (ts) ts.textContent = new Date().toLocaleTimeString();
        });
        hls.on(Hls.Events.ERROR, (_, data) => {
            if (!data.fatal) return;
            log('FATAL ERROR', data.type, data.details);
            consecutiveFailures += 1;
            if (consecutiveFailures >= 2) logServerDiag();
            scheduleReload(8000, `fatal: ${data.details}`);
        });
    }

    // Browsers throttle setInterval/setTimeout in background tabs to ~once/min,
    // so the watchdog above can't run normally. When the tab becomes visible
    // again, force a reload to skip whatever stale buffered data is sitting in
    // the video element and jump back to live.
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            hiddenSince = Date.now();
        } else {
            const hiddenMs = hiddenSince ? Date.now() - hiddenSince : 0;
            log(`tab visible again, was hidden ${hiddenMs}ms`);
            if (hiddenMs > 5000) scheduleReload(500, 'tab became visible');
        }
    });

    tryPlay();
}


// ── Main load + periodic refresh ────────────────────────────────────────────
async function loadCameras() {
    try {
        const res = await fetch('/api/status');
        const data = await res.json();
        statusBadge.textContent = 'System Live';
        statusBadge.style.background = '#2e7d32';

        data.cameras.forEach(cam => {
            // Always refresh the status dot for existing tiles
            const dot = document.getElementById('dot-' + cam.id);
            if (dot) {
                dot.className = dotClass(cam.status);
            }

            if (builtTiles[cam.id]) return;   // tile already in DOM, dot updated above
            builtTiles[cam.id] = cam.type;

            if (cam.type === 'lorex' || cam.type === 'ezviz' || cam.type === 'wyze_rtsp') {
                const tile = buildLorexTile(cam);
                grid.appendChild(tile);
                setTimeout(() => attachHLS(cam), 300);
            }
        });
    } catch (err) {
        statusBadge.textContent = 'Offline';
        statusBadge.style.background = '#c62828';
    }
}

loadCameras();
setInterval(loadCameras, 30000);  // refresh status dots every 30 s

async function sendPTZ(id, action) {
    await fetch('/api/ptz', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({camera_id: id, action})
    }).catch(() => {});
}

// ── Recordings modal ─────────────────────────────────────────────────────────
let _recCamId = null;

function formatRecTime(filename) {
    // filename: 20260426_214530.mp4
    const m = filename.match(/^(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/);
    if (!m) return filename;
    const d = new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +m[6]);
    return d.toLocaleString([], {month:'short', day:'numeric', year:'numeric',
                                  hour:'2-digit', minute:'2-digit'});
}

async function openRecordings(camId, camName) {
    _recCamId = camId;
    document.getElementById('rec-title').textContent = camName + ' — Recordings';
    document.getElementById('rec-modal').classList.add('open');
    document.getElementById('rec-list').innerHTML = '<div style="padding:16px;color:#666;font-size:12px">Loading…</div>';
    document.getElementById('rec-video').src = '';
    document.getElementById('rec-nowplaying').textContent = '';
    await loadRecordingsList(camId);
}

function closeRecordings() {
    document.getElementById('rec-modal').classList.remove('open');
    document.getElementById('rec-video').pause();
    if (_recHls) { _recHls.destroy(); _recHls = null; }
    document.getElementById('rec-video').src = '';
    _recCamId = null;
}

async function loadRecordingsList(camId) {
    const listEl = document.getElementById('rec-list');
    try {
        const res = await fetch(`/api/recordings/${camId}`);
        const data = await res.json();
        const banner = document.getElementById('rec-recording-banner');
        banner.classList.toggle('visible', !!data.recording);

        if (!data.recordings.length) {
            listEl.innerHTML = '<div id="rec-empty">No recordings yet.<br>Recording starts automatically.</div>';
            return;
        }
        listEl.innerHTML = '';
        data.recordings.forEach(rec => {
            const item = document.createElement('div');
            item.className = 'rec-item' + (rec.active ? ' active-rec' : '');
            item.innerHTML = `
                <div class="rec-item-date">${formatRecTime(rec.filename)}${rec.active ? ' <span style="color:#c62828;font-size:10px">● LIVE</span>' : ''}</div>
                <div class="rec-item-meta">${rec.size_mb} MB${rec.active ? ' · click to play recorded so far' : ''}</div>`;
            item.onclick = () => playRecording(rec.playlist, rec.filename, item);
            listEl.appendChild(item);
        });
    } catch (e) {
        listEl.innerHTML = '<div id="rec-empty">Failed to load recordings.</div>';
    }
}

let _recHls = null;

function playRecording(playlistUrl, filename, itemEl) {
    document.querySelectorAll('.rec-item').forEach(el => el.classList.remove('playing'));
    itemEl.classList.add('playing');
    const video = document.getElementById('rec-video');
    if (_recHls) { _recHls.destroy(); _recHls = null; }
    if (Hls.isSupported()) {
        _recHls = new Hls();
        _recHls.loadSource(playlistUrl);
        _recHls.attachMedia(video);
        _recHls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
    } else {
        video.src = playlistUrl;
        video.play().catch(() => {});
    }
    document.getElementById('rec-nowplaying').textContent = 'Playing: ' + formatRecTime(filename);
}

// Close modal on backdrop click
document.getElementById('rec-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('rec-modal')) closeRecordings();
});
</script>
</body>
</html>
